spring.application.name=Tears

#server.port=9090
server.port=${PORT:8080}
server.address=0.0.0.0

# database url
#spring.datasource.url=jdbc:mysql://localhost:3311/tears
#spring.datasource.username=root
#spring.datasource.password=root

twilio.account.sid=${TWILIO_SID}
twilio.auth.token=${TWILIO_TOKEN}
twilio.serviceSid=${TWILIO_S-ID}

# database
#spring.datasource.url=jdbc:mysql://${RDS_HOSTNAME}:${RDS_PORT}/mysql
#spring.datasource.username=${RDS_USERNAME}
#spring.datasource.password=${RDS_PASSWORD}
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# JPA
spring.jpa.show-sql=true
spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl-auto=update

# JWT
jwt.secret=mySuperSecretKey12345678901234567890123456789012
jwt.expiration=432000000

# upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ????? Tesseract ??????
tesseract.language=ara+eng
tesseract.datapath=C:/Program Files/Tesseract-OCR/tessdata

# errors
server.error.include-message=always
server.error.include-stacktrace=always
